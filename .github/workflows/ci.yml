name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npx @biomejs/biome check .
      - run: npx tsc --noEmit
      - run: npm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Fetch features
        run: bash scripts/fetch-features.sh
      - name: Start services
        env:
          E2E_ADMIN_KEY_HASH: ${{ secrets.E2E_ADMIN_KEY_HASH }}
        run: docker compose -f docker-compose.e2e.yml up -d --wait
      - name: Bootstrap tenant
        env:
          E2E_ADMIN_KEY: e2e-admin-key
        run: bash scripts/e2e-bootstrap.sh
      - name: Run e2e tests
        run: |
          set -a && . .env.e2e && set +a
          npm run test:e2e
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
